schema: spec-driven

context: |
  Cinema 4D plugin (C++) for importing and managing MMD (MikuMikuDance) data.
  Supports PMX/PMD models and VMD/VPD animation formats.

  Tech stack: C++17, Cinema 4D SDK (R2026), CMake (VS2022 v143)
  Platform: Win64, macOS
  Module ID: net.aimidi.mmdtool

  Dependencies:
  - libMMD (static) — MMD format parsing (PMX/PMD/VMD/VPD)
  - bullet3 (static) — Physics engine (libMMD private dependency)
  - Eigen (header-only) — Math library (libMMD public dependency)

  Source layout:
  - refactoring/ — Active plugin source code
  - res/S24_up/ — Plugin resources (descriptions, dialogs, strings)
  - dependency/ — Third-party sources (Bullet3, libMMD); built via CMake add_subdirectory, no install prefix required

  Conventions:
  - SDK compatibility macros in module/core/cmt_marco.h
  - Utils are header-only (.hpp) in refactoring/utils/
  - Debug libraries use _Debug suffix (e.g. libMMD_Debug.lib)
  - Error handling: iferr_scope_handler, iferr_return
  - Memory: NewObj/NewObjClear, AutoFree/AutoAlloc
  - Plugin IDs are registered at plugincafe.com

  Language: Simplified Chinese
  - All output must be written in Simplified Chinese. 
  - Add a brief English description document when archiving.
  - specs are written in English.

  Docs:
  - C4D SDK: https://developers.maxon.net/docs/cpp/2026_1_0/index.html
  - Code Style Guide: https://developers.maxon.net/docs/cpp/2026_1_0/page_maxonapi_style_guide.html

  Test:
  - add test case and test description for the changes of libMMD and make sure the changes pass all tests.

rules:
  proposal:
    - "Must follow the C4D SDK development documentation and Code Style Guide."
    - "SDK compatibility: All code that involves differences across SDK versions must be handled through compatible macros or utility functions in module/core/cmt_marco.h. Read cmt_marco.h before writing new code, and give priority to existing compatible facilities (such as MakeDescIDGeData, GetCustomDataTypeWritable, SDK2024_Const, etc.). If you encounter new API differences, add compatible macros/functions in cmt_marco.h instead of writing code for a specific SDK version directly."
    - "When a requirement change or an increase is noticed, update the document and the requirement change document synchronously, and update the task list in the requirement change document."
